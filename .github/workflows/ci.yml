permissions:
  contents: read

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TQDM_DISABLE: "1"

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy trustlens/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=trustlens --cov-report=xml --cov-report=term-missing --cov-fail-under=67 -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}

  build:
    name: Build distribution package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          pip install build twine

      - name: Build wheel and sdist
        run: |
          python -m build

      - name: Check distributions
        run: |
          twine check dist/*

      - name: Validate distribution
        run: |
          pip install dist/*.whl
          python -c "import trustlens; print('TrustLens version:', trustlens.__version__)"
          python -c "from trustlens import quick_analyze; quick_analyze(dataset='iris')"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
